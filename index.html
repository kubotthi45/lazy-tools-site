<head>
  <meta charset="UTF-8">

  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://sakuraku-tools.com/">
  <link rel="stylesheet" href="/css/common.css">

<body>
  <header class="site-header">
    <div class="container">
      <a href="/" class="logo">Sakuraku Tools</a>
      <p class="tagline">サクッと楽に、ずっと無料。</p>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <h1>ブラウザだけで完結する無料ツール</h1>
      <p>登録不要。ファイルはサーバーに送信されません。</p>
    </section>

    <section class="tools-grid">
      <a href="/tools/qr-generator/" class="tool-card">
        <div class="tool-icon">&#9641;</div>
        <h2>QRコード生成</h2>
        <p>テキストやURLからQRコードをサクッと作成。画像で保存できます。</p>
      </a>

      <a href="/tools/image-mosaic/" class="tool-card">
        <div class="tool-icon">&#9638;</div>
        <h2>画像モザイク加工</h2>
        <p>写真の一部にモザイクをかけられます。顔や個人情報の保護に。</p>
      </a>

      <a href="/tools/id-photo/" class="tool-card">
        <div class="tool-icon">&#128100;</div>
        <h2>証明写真サイズ変更</h2>
        <p>スマホ写真を履歴書・パスポート・免許証サイズに。高画質で保存。</p>
      </a>

      <a href="/tools/image-compress/" class="tool-card">
        <div class="tool-icon">&#128230;</div>
        <h2>画像圧縮</h2>
        <p>画像のファイルサイズを軽くします。「○KB以下」の指定もできます。</p>
      </a>
    </section>
  </main>

  <footer class="site-footer">
